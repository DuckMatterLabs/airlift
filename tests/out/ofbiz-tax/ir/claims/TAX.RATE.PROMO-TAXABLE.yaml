id: TAX.RATE.PROMO-TAXABLE
kind: behavior
title: Promotions are taxed only under rate rules that permit taxing promotions.
status: verified
priority: edge
terms: [promotions, rate-rule, promotions-taxable-flag, tax-adjustment, tax-amount]
depends_on: [TAX.ORDER.PROMO-TAX]
behavior: |
  Rule: Order-level promotions yield tax only under a rate-rule whose promotions-taxable-flag permits it
    Given an order with an order-level promotions amount
    When tax is calculated for the order under a rate-rule that permits taxing promotions
    Then an order-level tax-adjustment appears for the promotions
    But under a rate-rule that forbids taxing promotions no promotions tax-adjustment appears
scenarios:
  - name: promotions-taxed-when-rule-allows
    given:
      store: present
      destination-address: {country: present, state: present}
      rate-rule: {jurisdiction: state, rate-percentage: "6.25", promotions-taxable-flag: true}
      order-lines: [{product: taxable, unit-price: "100.00", quantity: "1"}]
      order-promotions: "100.00"
    expect:
      order-adjustments:
        - {adjustment-type: sales-tax-line, tax-amount: "6.250"}
  - name: promotions-not-taxed-when-rule-forbids
    given:
      store: present
      destination-address: {country: present, state: present}
      rate-rule: {jurisdiction: state, rate-percentage: "6.25", promotions-taxable-flag: false}
      order-lines: [{product: taxable, unit-price: "100.00", quantity: "1"}]
      order-promotions: "100.00"
    expect:
      order-adjustments: []
outputs_affected: [tax-amount]
observability: direct
source_fragments: [F-TAS-035, F-TAS-038]
confidence: derived-from-code
notes: >
  Unlike the freight split, the promotions call is made with no product, so a rate-rule that
  forbids taxing promotions is excluded from the rate lookup entirely. An unset
  promotions-taxable-flag is treated as permitting promotions tax.
