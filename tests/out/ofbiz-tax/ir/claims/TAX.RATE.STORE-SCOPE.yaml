id: TAX.RATE.STORE-SCOPE
kind: behavior
title: A rate rule applies only to its store, or everywhere when it is global.
status: verified
priority: edge
terms: [rate-rule, store-scope, global-rule, tax-adjustment, tax-amount]
depends_on: [TAX.RATE.AUTHORITY-MATCH]
behavior: |
  Rule: A store-scoped rate-rule is used only for its store; a global-rule is used for every store
    Given a rate-rule with store-scope for one selling store
    And a global-rule with no store-scope
    When tax is calculated for the order at that one selling store
    Then both the store-scoped rate-rule and the global-rule are considered
    And a rate-rule scoped to a different store is not considered
scenarios:
  - name: store-scoped-rule-applies-to-its-store
    given:
      store: store-A
      destination-address: {country: present, state: present}
      rate-rules:
        - {jurisdiction: state, store-scope: store-A, rate-percentage: "6.25"}
      order-lines: [{product: taxable, unit-price: "100.00", quantity: "1"}]
    expect:
      item-adjustments:
        - line: 0
          adjustments:
            - {adjustment-type: sales-tax-line, tax-amount: "6.250"}
outputs_affected: [tax-amount]
observability: direct
source_fragments: [F-TAS-031, F-PRODEM-005]
confidence: derived-from-code
notes: >
  A rate-rule scoped to another store yields no tax line at this store; a global-rule (no
  store-scope) matches regardless of which store sells.
attestations:
  - tier: verified
    evidence: tests/runs/m2-promotion/airliftblind.xml
    sha: 1a7d91a2979ed366f617978441a20575dab12281
    date: "2026-07-19T22:58:34"
