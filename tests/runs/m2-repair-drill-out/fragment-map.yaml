seams:
  - name: External contract to Java entry (order-level calcTax)
    fragments: [F-STAX-001, F-STAX-003, F-TAS-014]
    note: The service engine dispatches the calcTax service (implementing calcTaxInterface) to rateProductTaxCalc; the XML attribute contract defines the IN/OUT map the Java reads and returns.
  - name: External contract to Java entry (display calcTaxForDisplay)
    fragments: [F-STAX-002, F-STAX-004, F-TAS-003]
    note: The calcTaxForDisplay service (implementing calcTaxTotalForDisplayInterface) is dispatched to rateProductTaxCalcForDisplay; the XML defines its single-product IN/OUT contract.
  - name: Config-driven scale and rounding
    fragments: [F-ARITH-001, F-TAS-002, F-TAS-012, F-TAS-039]
    note: salestax.calc.decimals/final.decimals/rounding are read into static constants at class load and applied to every tax multiply/divide and final rounding across both entry points.
  - name: Jurisdiction resolution from address (geo containment)
    fragments: [F-TAS-018, F-TAS-019, F-TAS-026, F-TAS-027, F-PARTYEM-001, F-COMMONEM-001, F-COMMONEM-002, F-ACCTEM-002]
    note: The shipping PostalAddress geos are expanded to parent regions via GeoAssoc(REGIONS) then matched against TaxAuthority rows, turning one address into the set of applicable taxing authorities.
  - name: Rate-rule matching as query predicate
    fragments: [F-TAS-031, F-TAS-032, F-TAS-033, F-TAS-034, F-TAS-035, F-TAS-036, F-TAS-037, F-TAS-051, F-TAS-052, F-ACCTEM-006, F-PRODEM-001, F-PRODEM-004]
    note: Store scope, authority set, product-category membership (with variant/virtual rollup), threshold minima, and shipping/promotions taxability are all fused into one TaxAuthorityRateProduct EntityCondition and executed as a single ordered, date-filtered lookup.
  - name: Party tax exemption (group rollup and jurisdiction inheritance)
    fragments: [F-TAS-044, F-TAS-054, F-TAS-055, F-TAS-056, F-PARTYEM-002, F-ACCTEM-001, F-ACCTEM-003]
    note: The bill-to party plus its GROUP_ROLLUP parents are checked against effective PartyTaxAuthInfo; when exempt the tax is zeroed, otherwise the check recurses up the TaxAuthorityAssoc(EXEMPT_INHER) parent authority chain.
  - name: VAT-in-price handling and price correction
    fragments: [F-TAS-041, F-TAS-042, F-TAS-045, F-TAS-046, F-TAS-049, F-PRODEM-003, F-PRODEM-005]
    note: ProductPrice taxInPrice/priceWithTax (store-group scoped, with virtual-product fallback) drive VAT tax extraction, a negative discounted-tax adjustment, and a VAT_PRICE_CORRECT reconciliation.
  - name: Order-level freight/promotion tax split
    fragments: [F-TAS-021, F-TAS-022, F-TAS-023, F-TAS-024, F-ORDEREM-001]
    note: Per-product value weights are computed across items, then order shipping and promotion tax are allocated to products by weight and emitted as OrderAdjustment rows.
  - name: Face-to-face sale address fallback
    fragments: [F-TAS-017, F-PRODEM-002, F-PARTYEM-001]
    note: When no shipping address is supplied but a facility is, the facility's SHIP_ORIG_LOCATION/PRIMARY_LOCATION PostalAddress becomes the taxing jurisdiction source.
