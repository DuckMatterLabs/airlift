inventory:
  - path: applications/accounting/src/main/java/org/apache/ofbiz/accounting/tax/TaxAuthorityServices.java
    why: Primary source file; hosts the sales-tax calculation seam (entry points and all private workhorses). Total fragment coverage.
  - path: applications/accounting/servicedef/services_tax.xml
    why: External contract; defines calcTax / calcTaxForDisplay services and their interfaces that wire the Java logic to the service engine.
  - path: applications/accounting/config/arithmetic.properties
    why: Load-bearing config; supplies salestax.calc.decimals, salestax.final.decimals, salestax.rounding read into TAS static constants.
  - path: applications/datamodel/entitydef/accounting-entitymodel.xml
    why: Schema for TaxAuthority, TaxAuthorityAssoc, TaxAuthorityCategory, TaxAuthorityGlAccount, TaxAuthorityRateProduct, TaxAuthorityRateType, PartyTaxAuthInfo touched on the tax control path.
  - path: applications/datamodel/entitydef/party-entitymodel.xml
    why: Schema for PostalAddress (jurisdiction resolution) and PartyRelationship (GROUP_ROLLUP exemption rollup).
  - path: applications/datamodel/entitydef/product-entitymodel.xml
    why: Schema for ProductStore, Product, ProductPrice, ProductCategoryMember, Facility touched on the tax control path.
  - path: framework/common/entitydef/entitymodel.xml
    why: Schema for Geo and GeoAssoc used to resolve and expand taxing jurisdictions from an address.
  - path: applications/datamodel/entitydef/order-entitymodel.xml
    why: Schema for OrderAdjustment, the output shape produced by the tax calculation.
  - path: framework/common/src/main/java/org/apache/ofbiz/common/geo/GeoWorker.java
    why: Helper on the control path (expandGeoRegionDeep) for geo-region containment; referenced, no fragment coverage required.
  - path: applications/party/src/main/java/org/apache/ofbiz/party/contact/ContactMechWorker.java
    why: Helper on the control path (getPostalAddressPostalCodeGeoId, getFacilityContactMechByPurpose); referenced, no fragment coverage required.
  - path: applications/product/src/main/java/org/apache/ofbiz/product/product/ProductWorker.java
    why: Helper on the control path (getVariantVirtualId, getParentProduct) for variant/virtual product resolution; referenced, no fragment coverage required.
  - path: framework/base/src/main/java/org/apache/ofbiz/base/util/UtilNumber.java
    why: Helper on the control path (getBigDecimalScale, getRoundingMode) reading arithmetic.properties; referenced, no fragment coverage required.

