  - TAX.CONFIG.FINAL-PRECISION
  - TAX.CONTRACT.CALC-ORDER-TAX
  - TAX.CONTRACT.DISPLAY-PRICE-WITH-TAX
  - TAX.EXEMPT.EFFECTIVE-INFO
  - TAX.EXEMPT.ZEROING
  - TAX.JURIS.ADDRESS-REQUIRED
  - TAX.JURIS.ADDRESS-TO-JURISDICTION
  - TAX.ORDER.PER-ITEM
  - TAX.ORDER.VALUE-WEIGHT
  - TAX.RATE.AUTHORITY-MATCH
  - TAX.RATE.STORE-SCOPE
  - TAX.RATE.THRESHOLD-MIN-ITEM-PRICE
  - TAX.RATE.THRESHOLD-MIN-PURCHASE
  - TAX.RATE.VARIANT-CATEGORY
  - TAX.VAT.PRICE-GROUP-SCOPE
  - TAX.VAT.VARIANT-PRICE

# Classify, never discard: nothing was dropped.
descoped: []

catalog_deltas:
  - kind: added
    claims: [TAX.CONFIG.CALC-PRECISION, TAX.CONFIG.FINAL-PRECISION]
    reason: >
      Emitted the load-bearing precision/rounding rules as explicit config claims so that
      every worked numeric scenario cites concrete constants (calc=3dp, final=2dp, HALF_UP).
  - kind: added
    claims: [TAX.CONTRACT.CALC-ORDER-TAX, TAX.CONTRACT.DISPLAY-PRICE-WITH-TAX]
    reason: >
      Added explicit contract claims describing the seam request/response in domain
      vocabulary (field by field) to make blind test generation possible.
  - kind: promoted
    claims: [TAX.DISPLAY.VAT-ONLY, TAX.DISPLAY.PRICE-WITH-TAX, TAX.DISPLAY.FINAL-ROUNDING]
    reason: >
      Catalog priority is secondary, but all three are pinned by green backfill tests, so
      they are promoted to claims rather than descoped. Priority left as secondary.
  - kind: split
    claims: [TAX.ORDER.VALUE-WEIGHT, TAX.ORDER.FREIGHT-SPLIT]
    reason: >
      The value-weight apportionment mechanism (internal) is split from the observable
      freight-split behavior for crisper claims.
  - kind: split
    claims: [TAX.VAT.PRICE-INCLUSIVE, TAX.VAT.DISCOUNT-CORRECTION, TAX.VAT.PRICE-CORRECTION, TAX.VAT.VARIANT-PRICE, TAX.VAT.PRICE-GROUP-SCOPE]
    reason: >
      VAT-in-price handling split into inclusive-price reporting, discount correction,
      price-with-tax correction, variant fallback, and price-group scoping.

# From backfill-report.yaml: no catalog corrections were discovered during pinning.
catalog_corrections: []

artifacts:
  glossary: glossary.yaml
  domain_model: domain-model.yaml
  traceability: traceability.yaml
  claims_dir: claims/
  provenance_dir: provenance/
  architecture_dir: architecture/
