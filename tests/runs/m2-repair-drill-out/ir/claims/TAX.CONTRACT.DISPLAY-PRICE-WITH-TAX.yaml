id: TAX.CONTRACT.DISPLAY-PRICE-WITH-TAX
kind: contract
title: The display tax-calculation returns a single product's price-with-tax, tax-total, and combined percentage.
status: extracted
priority: core
terms: [tax-calculation, selling-store, product, unit-price, quantity, price-with-tax,
        display-price-with-tax, tax-total, combined-tax-percentage]
depends_on: []
behavior: |
  Rule: A caller asks for one product's price-with-tax and receives display totals
    Given a selling-store and a product are identified
    And a base unit-price, and optionally a quantity and a shipping price, are supplied
    When the display price-with-tax is calculated for the product
    Then the response carries a display-price-with-tax
    And the response carries a tax-total
    And the response carries a combined-tax-percentage
scenarios:
  - name: single-product-display-round-trip
    given:
      selling-store: identified
      rate-rule: {rate-percentage: "6.25"}
      product: {unit-price: "100.00", quantity: "1", taxable: true}
    expect:
      # tax 6.25% of 100.00 = 6.250 -> final 2 dp = 6.25; price-with-tax = 106.25
      display-price-with-tax: "106.25"
      tax-total: "6.25"
      combined-tax-percentage: "6.25"
outputs_affected: [display-price-with-tax, tax-total, combined-tax-percentage]
observability: direct
source_fragments: [F-TAS-003, F-TAS-004, F-STAX-002, F-STAX-004]
confidence: derived-from-code
notes: >
  This is the canonical `When the display price-with-tax is calculated for the product` action
  referenced by the DISPLAY claims. Maps to harness fx.calcTaxForDisplay(...) -> DisplayResult.
