id: TAX.VAT.PRICE-INCLUSIVE
kind: behavior
title: A tax-inclusive price reports its contained tax as included, not added on top.
status: extracted
priority: core
terms: [tax-inclusive-price, product, unit-price, quantity, rate-percentage, vat-tax-line,
        included-tax, tax-amount, tax-line]
depends_on: [TAX.CONTRACT.CALC-ORDER-TAX, TAX.CALC.TAX-AMOUNT]
behavior: |
  Rule: Included tax is reported, not appended
    Given a product configured with a tax-inclusive-price for the taxing-jurisdiction's tax-authority
    And a rate-rule with a rate-percentage under that tax-authority
    And an order-line for that product with a unit-price and a quantity
    When tax is calculated for the order
    Then the tax-line is a vat-tax-line
    And its included-tax is the tax contained in the price
    And its tax-amount is zero
scenarios:
  - name: twenty-percent-included-in-price
    given:
      tax-inclusive-price: {price: "120.00", tax-inclusive: true}
      rate-rule: {rate-percentage: "20"}
      order-line: {product: taxable, unit-price: "120.00", quantity: "1"}
    expect:
      # 120.00 - 120.00/(1+20/100) = 120.00 - 100.00 = 20.00 included; nothing added
      tax-line: {kind: vat-tax-line, included-tax: "20.00", tax-amount: "0", rate-percentage: "20"}
outputs_affected: [tax-line, included-tax, tax-amount]
observability: direct
source_fragments: [F-TAS-041, F-TAS-042, F-PRODEM-003]
confidence: derived-from-code
notes: >
  included-tax = round(unit-price - unit-price/(1 + rate/100), 2, HALF_UP) * quantity.
  With no discount (item-amount = unit-price*quantity) no negative correction is emitted.
  Pinned by a green backfill test.
