    kind: JUnit-3 OFBizTestCase (junit-test-suite), registered in applications/accounting/ofbiz-component.xml:69 via testdef/airliftsmoketests.xml
    touches: [F-STAX-003, F-TAS-014, F-TAS-015, F-TAS-016, F-TAS-018, F-TAS-019, F-TAS-020,
              F-TAS-021, F-TAS-022, F-TAS-025, F-TAS-026, F-TAS-027, F-TAS-029, F-TAS-030,
              F-TAS-031, F-TAS-032, F-TAS-033, F-TAS-036, F-TAS-037, F-TAS-038, F-TAS-039,
              F-TAS-040, F-TAS-041, F-TAS-043, F-TAS-044, F-TAS-049, F-TAS-051, F-TAS-053,
              F-TAS-054, F-TAS-055, F-ARITH-001, F-ACCTEM-001, F-ACCTEM-002, F-ACCTEM-006,
              F-ACCTEM-007, F-PARTYEM-001, F-PRODEM-001, F-PRODEM-003, F-PRODEM-004,
              F-PRODEM-005, F-COMMONEM-001, F-COMMONEM-002, F-ORDEREM-001]
    observes_outcome: yes
    evidence: >-
      testBasicSalesTaxCalculation asserts SALES_TAX type (SmokeTaxTests.java:29),
      amount 6.250 (line 31), rate 6.25 (line 32), jurisdiction geo == state (line 33);
      testExemptPartyPaysZero asserts amount 0 (line 55), exemptAmount 10.000 (line 56),
      customerTaxId 'EX-001' (line 57). Both call fx.calcTax()...run() ->
