# Airlift Stage 2 — Test-landscape survey of the sales-tax seam
# Target: applications/accounting/.../tax/TaxAuthorityServices.java via the calcTax /
#         calcTaxForDisplay services. Coverage judged for behaviour-carrying fragments
#         (role: business-logic | fused) in fragment-map.yaml.

schema_version: "1.0"

search_log:
  # -- direct references to the seam symbols / contract across all source idioms --
  - pattern: 'rateProductTaxCalc|calcTaxForDisplay|calcTax\b|TaxAuthorityServices'
    scope: 'repo-wide, --include java/xml/groovy/ftl, excluding the seam files themselves'
    hits: 15   # all callers/UI-labels; only accounting tax test dir + order/invoice main code
  - pattern: 'rateProductTaxCalc'
    scope: 'applications/*/src/test, applications/*/testdef, framework/*/src/test, framework/*/testdef'
    hits: 0    # no test names the Java entry point directly
  - pattern: 'calcTax|calcTaxForDisplay'
    scope: 'all src/test + testdef trees, excluding the airlift harness'
    hits: 0    # no native OFBiz test invokes the calcTax service
  - pattern: 'calcTax|calcTaxForDisplay'
    scope: 'applications/accounting/src/test (airlift harness included)'
    hits: 2    # TaxFixture.java (DSL runner) + SmokeTaxTests.java (self-test)
  - pattern: 'TaxAuthorityServices'
    scope: 'applications/*/src/test, framework/*/src/test'
    hits: 0    # no test imports/references the class
  - pattern: 'SALES_TAX'
    scope: 'applications/*/src/test, applications/*/testdef'
    hits: 6    # investigated each — none is produced by the seam (see note below)
  - pattern: 'tax'
    scope: 'applications/*/testdef/*.xml (declarative test-suite defs), excluding airlift'
    hits: 0    # no simple-method / entity-xml test-case exercises tax calc
  - pattern: 'test-suite / junit-test-suite registration'
    scope: 'applications/accounting/ofbiz-component.xml + applications/accounting/testdef/*.xml'
    hits: 9    # 6 native suites + 3 airlift suites (smoke registered; backfill/blind stubbed)
  - pattern: 'createOrder|checkout|storeOrder|shipTo|shippingContactMech'
    scope: 'applications/order/src/test/groovy, applications/order/testdef (OrderTests, ShoppingCartTests, QuoteTests)'
    hits: 0    # no order/checkout test drives a shipping address into the tax engine

# NOTE on the 6 SALES_TAX hits: QuoteTests.groovy:341 asserts a pre-seeded QuoteAdjustment
# (SALES_TAX) copied by copyQuoteItem from QuoteTestData.xml — never computed by the seam.
# AutoAcctgAdminTests.groovy uses invoiceItemType 'PINV_SALES_TAX' (GL posting, not calcTax).
# The remaining hits are seed-data rows in *TestData.xml. None invoke rateProductTaxCalc.

