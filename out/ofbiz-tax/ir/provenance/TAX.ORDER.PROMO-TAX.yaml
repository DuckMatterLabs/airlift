    summary: >
      OFBIZ-225 ("Discussion about the interaction between order total promotions and sales
      taxes", patch from Amit Shinde) made it possible to include order-level promotions in
      sales-tax calculation. Promotions are taxed only when the TaxAuthorityRateProduct
      taxPromotions flag is Y (see TAX.RATE.PROMO-TAXABLE), producing an order-level tax
      adjustment for the promotions amount.
